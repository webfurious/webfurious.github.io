<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message received — Webfurious Designs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060910; color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .ty-card { max-width: 480px; text-align: center; }
    .ty-icon { font-size: 3.5rem; margin-bottom: 1.5rem; display: block; }
    .ty-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: #f6c90e; margin-bottom: 0.75rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #f1f5f9; margin-bottom: 1rem; line-height: 1.2; }
    p { color: #94a3b8; font-size: 1rem; line-height: 1.7; margin-bottom: 2rem; }
    .ty-btn { display: inline-block; background: #60a5fa; color: #060910; font-weight: 700; font-size: 0.9rem; padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; transition: background 0.2s; }
    .ty-btn:hover { background: #93c5fd; }
  </style>
</head>
<body>
  <div class="ty-card">
    <span class="ty-icon">✉️</span>
    <p class="ty-eyebrow">Webfurious Designs</p>
    <h1>Message received!</h1>
    <p>Thanks for reaching out. I'll get back to you within one business day. If it's urgent, feel free to reach out directly.</p>
    <a href="/index.html" class="ty-btn">Back to Home</a>
  </div>
</body>
</html>
